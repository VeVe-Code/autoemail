services:
  - type: web
    name: autoemail
    env: node
    plan: starter
    region: singapore
    buildCommand: PLAYWRIGHT_BROWSERS_PATH=0 npm install && PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install chromium && npm run build
    startCommand: npm run start:render
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Add the rest in Render dashboard (from your .env)
