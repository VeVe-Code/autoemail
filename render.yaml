services:
  - type: web
    name: autoemail
    env: node
    plan: starter
    region: singapore
    buildCommand: PLAYWRIGHT_BROWSERS_PATH=/opt/render/.cache/ms-playwright npm install && PLAYWRIGHT_BROWSERS_PATH=/opt/render/.cache/ms-playwright npx playwright install chromium && npm run build
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/.cache/ms-playwright
      # Add the rest in Render dashboard (from your .env)
