services:
  - type: web
    name: autoemail
    env: node
    plan: starter
    region: singapore
    buildCommand: npm install && PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install --with-deps chromium && npm run build
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      # Add the rest in Render dashboard (from your .env)
